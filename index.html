<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROD | منصة المشاهدة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --main-color: #ff9800; --bg-color: #0b0b0b; }
        body { background: var(--bg-color); color: white; font-family: 'Cairo', sans-serif; margin: 0; min-height: 100vh; }
        
        #auth-screen { text-align: center; width: 100%; padding: 20px; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; }
        #auth-screen h1 { color: var(--main-color); font-size: 3.5rem; margin-bottom: 20px; letter-spacing: 5px; }
        .login-box { background: #1a1a1a; padding: 40px 30px; border-radius: 20px; border: 1px solid #333; max-width: 400px; margin: auto; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #444; background: #222; color: white; text-align: center; font-size: 1.1rem; box-sizing: border-box; }
        .login-btn { width: 100%; padding: 15px; background: var(--main-color); color: black; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.2rem; }
        
        #main-content { display: none; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; border-bottom: 2px solid var(--main-color); background: #000; position: sticky; top: 0; z-index: 100; }
        .logout-btn { background: #333; color: white; border: 1px solid #444; padding: 6px 15px; border-radius: 6px; cursor: pointer; }

        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: #1a1a1a; border-radius: 12px; overflow: hidden; border: 1px solid #333; cursor: pointer; position: relative; }
        .card img { width: 100%; height: 240px; object-fit: cover; }
        
        #player { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; flex-direction: column; overflow-y: auto; }
        .close-btn { position: absolute; top: 20px; left: 20px; background: var(--main-color); color: black; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; z-index: 10002; }
        video { width: 100%; max-width: 900px; margin: 80px auto 20px; border: 1px solid var(--main-color); border-radius: 10px; }
    </style>
</head>
<body>

<div id="auth-screen">
    <h1>ROD</h1>
    <div class="login-box">
        <input type="text" id="username" placeholder="اسم المستخدم" autocomplete="off">
        <input type="password" id="password" placeholder="كلمة المرور" autocomplete="new-password">
        <button class="login-btn" onclick="login()">دخول المنصة</button>
        <p id="error-msg" style="color:red; display:none; margin-top:10px;">بيانات الدخول خاطئة!</p>
    </div>
</div>

<div id="main-content">
    <header>
        <button class="logout-btn" onclick="logout()">تسجيل الخروج</button>
        <h1 style="color:var(--main-color)">ROD</h1>
    </header>
    <div class="container" id="movie-list"></div>
</div>

<div id="player">
    <div class="close-btn" onclick="closePlayer()">إغلاق ✕</div>
    <video id="main-video" controls playsinline></video>
</div>

<script>
    const GITHUB_REPO = "ha8680878-lab/cinema-local";

    // 1. فحص الجلسة فوراً عند التحميل
    const checkSession = () => {
        const session = localStorage.getItem('ROD_ACTIVE_USER');
        if (session === 'true') {
            document.getElementById('main-content').style.display = 'block';
            loadMovies();
        } else {
            document.getElementById('auth-screen').style.display = 'block';
        }
    };

    async function login() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;

        try {
            const res = await fetch(`https://raw.githubusercontent.com/${GITHUB_REPO}/main/keys.json?nocache=${new Date().getTime()}`);
            const users = await res.json();
            const found = users.find(user => user.user === u && user.pass === p);

            if (found) {
                // حفظ الجلسة في المتصفح
                localStorage.setItem('ROD_ACTIVE_USER', 'true');
                location.reload(); // إعادة تحميل لضمان تفعيل الحالة
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        } catch (e) {
            alert("خطأ في قاعدة البيانات!");
        }
    }

    function logout() {
        localStorage.removeItem('ROD_ACTIVE_USER');
        location.reload();
    }

    async function loadMovies() {
        const res = await fetch(`movies.json?v=${new Date().getTime()}`);
        const data = await res.json();
        const list = document.getElementById('movie-list');
        list.innerHTML = "";
        data.forEach(m => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<img src="${m.poster}"><div style="padding:10px;text-align:center;">${m.title}</div>`;
            card.onclick = () => {
                document.getElementById('main-video').src = m.url;
                document.getElementById('player').style.display = 'flex';
                document.getElementById('main-video').play();
            };
            list.appendChild(card);
        });
    }

    function closePlayer() {
        document.getElementById('player').style.display = 'none';
        document.getElementById('main-video').pause();
    }

    // تشغيل الفحص
    checkSession();
</script>
</body>
</html>
