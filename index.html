<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ROD | منصة الترفيه</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --main: #ff9800; 
            --bg: #050505; 
            --card-w: 160px; 
            --glass: rgba(15, 15, 15, 0.9);
            --smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Cairo', sans-serif; 
            margin: 0; 
            overflow-x: hidden;
        }

        /* --- الشعار --- */
        .logo { font-size: 1.8rem; font-weight: 900; color: var(--main); text-decoration: none; display: flex; align-items: center; gap: 5px; }
        .logo-text { animation: logoPulse 2s infinite ease-in-out; }
        @keyframes logoPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); text-shadow: 0 0 20px var(--main); } }

        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 5%; background: var(--glass); backdrop-filter: blur(15px); 
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #111;
        }

        /* --- قسم البحث --- */
        .search-container { padding: 10px 5%; background: var(--bg); }
        .search-box {
            width: 100%; padding: 12px 20px; border-radius: 12px; border: 1px solid #222;
            background: #111; color: #fff; font-family: 'Cairo'; font-size: 0.9rem;
            transition: var(--smooth);
        }
        .search-box:focus { border-color: var(--main); box-shadow: 0 0 15px rgba(255,152,0,0.2); }

        /* --- الأزرار --- */
        .btn-nav { 
            background: var(--main); color: #000; padding: 8px 18px; 
            border-radius: 10px; font-weight: 800; border: none; cursor: pointer;
            font-family: 'Cairo'; font-size: 0.85rem; transition: var(--smooth);
        }
        .btn-nav:hover { opacity: 0.9; transform: scale(1.05); }
        .btn-secondary { background: #222; color: #fff; margin-left: 8px; }

        /* --- الشبكة والصفوف --- */
        .row { margin-bottom: 30px; padding-right: 5%; }
        .row-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 15px; color: #eee; border-right: 4px solid var(--main); padding-right: 10px; }
        .row-container { display: flex; overflow-x: auto; gap: 15px; padding-bottom: 10px; scrollbar-width: none; }
        .row-container::-webkit-scrollbar { display: none; }

        .card { flex: 0 0 var(--card-w); border-radius: 12px; overflow: hidden; position: relative; background: #111; cursor: pointer; transition: var(--smooth); }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .card img { width: 100%; height: 230px; object-fit: cover; }
        .card-title { position: absolute; bottom: 0; width: 100%; padding: 15px 10px; background: linear-gradient(transparent, #000); font-size: 0.8rem; text-align: center; }

        /* --- المشغل --- */
        #player { display: none; position: fixed; inset: 0; background: #000; z-index: 2000; flex-direction: column; overflow-y: auto; }
        .p-header { padding: 15px 5%; display: flex; align-items: center; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); position: sticky; top: 0; }
        video { width: 100%; max-height: 60vh; background: #000; }

        .movie-details { padding: 20px 5%; }
        .movie-details h1 { color: var(--main); font-size: 1.6rem; margin: 0; font-weight: 900; }

        #auth-screen { position: fixed; inset: 0; background: #050505; display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .login-box { width: 90%; max-width: 350px; text-align: center; }
        .login-box input { width: 100%; padding: 14px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #222; background: #111; color: #fff; text-align: center; font-family: 'Cairo'; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="login-box">
        <h1 style="color:var(--main); font-size:3rem; margin-bottom:20px;">ROD</h1>
        <input type="text" id="user" placeholder="المستخدم">
        <input type="password" id="pass" placeholder="الرمز">
        <button class="btn-nav" style="width:100%; padding:15px;" onclick="handleLogin()">دخول</button>
    </div>
</div>

<div id="main-content" style="display:none;">
    <header>
        <button class="btn-nav btn-secondary" onclick="handleLogout()">خروج</button>
        <a href="#" class="logo">ROD<span>▸</span></a>
    </header>

    <div class="search-container">
        <input type="text" class="search-box" id="searchInput" placeholder="ابحث عن فيلم، مسلسل، أو قسم..." oninput="filterMovies()">
    </div>

    <div id="app-body"></div>
</div>

<div id="player">
    <div class="p-header">
        <button class="btn-nav btn-secondary" onclick="closePlayer()">رجوع</button>
        <button class="btn-nav" style="margin-right:10px;" onclick="closePlayer()">الرئيسية</button>
        <div id="p-title-nav" style="margin-right:auto; font-weight:700; font-size:0.9rem;"></div>
    </div>
    
    <video id="main-vid" controls playsinline></video>

    <div class="movie-details">
        <h1 id="p-title-main"></h1>
        <p style="color:#666;">مشاهدة ممتعة عبر منصة ROD</p>
    </div>
</div>

<script>
    const REPO = "ha8680878-lab/cinema-local";
    let moviesData = [];

    async function handleLogin() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        const res = await fetch(`https://raw.githubusercontent.com/${REPO}/main/keys.json?v=${Date.now()}`);
        const keys = await res.json();
        if(keys.find(k => k.user === u && k.pass === p)) {
            localStorage.setItem('ROD_AUTH', 'true');
            location.reload();
        } else { alert("خطأ!"); }
    }

    if(localStorage.getItem('ROD_AUTH')) {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        loadApp();
    }

    async function loadApp() {
        const res = await fetch(`movies.json?v=${Date.now()}`);
        moviesData = await res.json();
        renderRows(moviesData);
    }

    function renderRows(data) {
        const body = document.getElementById('app-body');
        const cats = [...new Set(data.map(m => m.category || "أفلام مختارة"))];
        body.innerHTML = cats.map(cat => `
            <div class="row">
                <div class="row-title">${cat}</div>
                <div class="row-container">
                    ${data.filter(m => (m.category || "أفلام مختارة") === cat).map(m => `
                        <div class="card" onclick="openPlayer('${m.url}', '${m.title}')">
                            <img src="${m.poster}" loading="lazy">
                            <div class="card-title">${m.title}</div>
                        </div>
                    `).join('')}
                </div>
            </div>
        `).join('');
    }

    // دالة البحث
    function filterMovies() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        const filtered = moviesData.filter(m => 
            m.title.toLowerCase().includes(q) || 
            (m.category && m.category.toLowerCase().includes(q))
        );
        renderRows(filtered);
    }

    function openPlayer(url, title) {
        document.getElementById('p-title-nav').innerText = title;
        document.getElementById('p-title-main').innerText = title;
        const v = document.getElementById('main-vid');
        v.src = url;
        document.getElementById('player').style.display = 'flex';
        v.play();
    }

    function closePlayer() {
        document.getElementById('player').style.display = 'none';
        document.getElementById('main-vid').pause();
    }

    function handleLogout() { localStorage.removeItem('ROD_AUTH'); location.reload(); }
</script>
</body>
</html>
