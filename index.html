<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROD</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --main-color: #ff9800; --bg-black: #080808; --card-w: 160px; }
        body { background: var(--bg-black); color: white; font-family: 'Cairo', sans-serif; margin: 0; overflow-x: hidden; min-height: 100vh; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 4%; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #1a1a1a; }
        .logo { font-size: 1.8rem; font-weight: 900; color: var(--main-color); text-decoration: none; }

        #auth-screen { position: fixed; inset: 0; background: var(--bg-black); display: flex; align-items: center; justify-content: center; z-index: 10000; display: none; }
        .login-box { width: 85%; max-width: 350px; text-align: center; background: #111; padding: 40px 30px; border-radius: 20px; border: 1px solid #222; }
        input { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: white; text-align: center; box-sizing: border-box; font-family: 'Cairo'; }
        .login-btn { width: 100%; padding: 15px; background: var(--main-color); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }

        .row { margin-bottom: 30px; padding: 0 4%; }
        .row-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 15px; border-right: 4px solid var(--main-color); padding-right: 15px; }
        .row-container { display: flex; overflow-x: auto; gap: 15px; padding-bottom: 15px; scrollbar-width: none; }
        .row-container::-webkit-scrollbar { display: none; }

        .card { flex: 0 0 var(--card-w); border-radius: 10px; overflow: hidden; transition: 0.3s; cursor: pointer; border: 1px solid #1a1a1a; position: relative; }
        .card:hover { transform: scale(1.05); border-color: var(--main-color); }
        .card img { width: 100%; height: 230px; object-fit: cover; pointer-events: none; }
        .card-title { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, black); padding: 20px 10px 10px; font-size: 0.85rem; text-align: center; }

        #player { display: none; position: fixed; inset: 0; background: #000; z-index: 10001; flex-direction: column; overflow-y: auto; }
        .player-nav { padding: 15px; background: #111; display: flex; align-items: center; gap: 20px; }
        .back-btn { background: var(--main-color); color: black; padding: 8px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        video { width: 100%; max-height: 70vh; background: #000; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="login-box">
        <h1 style="color:var(--main-color);">▸ ROD</h1>
        <input type="text" id="username" placeholder="اسم المستخدم">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button class="login-btn" onclick="login()">دخول</button>
    </div>
</div>

<div id="main-content" style="display:none;">
    <header>
        <button onclick="logout()" style="background:none; border:1px solid #333; color:#777; padding:5px; cursor:pointer;">خروج</button>
        <div class="logo">ROD ▸</div>
    </header>
    <div id="sections-list" style="margin-top:20px;"></div>
</div>

<div id="player">
    <div class="player-nav">
        <div class="back-btn" onclick="closePlayer()">رجوع</div>
        <div id="p-title"></div>
    </div>
    <video id="v-play" controls playsinline></video>
    <div id="giscus-area" style="padding:20px;"></div>
</div>

<script>
    const REPO = "ha8680878-lab/cinema-local";

    window.onload = function() {
        // فحص الجلسة باستخدام مفتاح جديد لضمان عدم التعارض
        if (localStorage.getItem('ROD_LOGGED_IN') === 'true') {
            document.getElementById('main-content').style.display = 'block';
            loadData();
        } else {
            document.getElementById('auth-screen').style.display = 'flex';
        }
    };

    async function login() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        try {
            const response = await fetch(`https://raw.githubusercontent.com/${REPO}/main/keys.json?v=${Date.now()}`);
            const data = await response.json();
            const user = data.find(x => x.user === u && x.pass === p);
            if (user) {
                localStorage.setItem('ROD_LOGGED_IN', 'true');
                location.reload();
            } else { alert("بيانات خاطئة!"); }
        } catch (e) { alert("خطأ في الاتصال بالسيرفر!"); }
    }

    function logout() {
        localStorage.removeItem('ROD_LOGGED_IN');
        location.reload();
    }

    async function loadData() {
        const container = document.getElementById('sections-list');
        try {
            const res = await fetch(`movies.json?v=${Date.now()}`);
            if (!res.ok) throw new Error();
            const movies = await res.json();
            
            const cats = [...new Set(movies.map(m => m.category || "أفلام ROD"))];
            
            if (movies.length === 0) {
                container.innerHTML = "<p style='text-align:center; color:#555;'>لا توجد أفلام حالياً</p>";
                return;
            }

            container.innerHTML = cats.map(c => `
                <div class="row">
                    <div class="row-title">${c}</div>
                    <div class="row-container">
                        ${movies.filter(m => (m.category || "أفلام ROD") === c).map(m => `
                            <div class="card" onclick="playMovie('${m.url}', '${m.title}')">
                                <img src="${m.poster}" onerror="this.src='https://via.placeholder.com/160x230/111/fff?text=No+Poster'">
                                <div class="card-title">${m.title}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        } catch (e) {
            container.innerHTML = "<p style='text-align:center; color:red;'>فشل تحميل قائمة الأفلام</p>";
        }
    }

    function playMovie(url, title) {
        document.getElementById('p-title').innerText = title;
        const v = document.getElementById('v-play');
        v.src = url;
        document.getElementById('player').style.display = 'flex';
        v.play();
    }

    function closePlayer() {
        document.getElementById('player').style.display = 'none';
        const v = document.getElementById('v-play');
        v.pause();
        v.src = "";
    }
</script>
</body>
</html>
