<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROD</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --main-color: #ff9800; --bg-black: #080808; --card-w: 160px; }
        body { background: var(--bg-black); color: white; font-family: 'Cairo', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* الهيدر المحترف */
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 4%; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #1a1a1a; }
        .logo { font-size: 1.8rem; font-weight: 900; color: var(--main-color); text-decoration: none; display: flex; align-items: center; }
        .logo span { color: white; margin-right: 5px; }

        /* شاشة الدخول */
        #auth-screen { position: fixed; inset: 0; background: var(--bg-black); display: flex; align-items: center; justify-content: center; z-index: 10000; display: none; }
        .login-box { width: 85%; max-width: 350px; text-align: center; background: #111; padding: 40px 30px; border-radius: 20px; border: 1px solid #222; }
        input { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: white; text-align: center; box-sizing: border-box; }
        .login-btn { width: 100%; padding: 15px; background: var(--main-color); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }

        /* تنسيق الأقسام السلايدر */
        .row { margin-bottom: 30px; padding-right: 4%; }
        .row-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 15px; display: flex; align-items: center; }
        .row-title::before { content: ''; width: 4px; height: 20px; background: var(--main-color); margin-left: 10px; border-radius: 2px; }
        
        .row-container { display: flex; overflow-x: auto; gap: 15px; padding-bottom: 15px; scrollbar-width: none; scroll-behavior: smooth; }
        .row-container::-webkit-scrollbar { display: none; }

        /* الكارت بستايل نتفليكس */
        .card { flex: 0 0 var(--card-w); position: relative; border-radius: 10px; overflow: hidden; transition: 0.4s; cursor: pointer; border: 1px solid #1a1a1a; }
        .card:hover { transform: scale(1.05); border-color: var(--main-color); z-index: 2; }
        .card img { width: 100%; height: 230px; object-fit: cover; display: block; }
        .card-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, transparent 100%); padding: 15px 10px; }
        .card-title { font-size: 0.85rem; font-weight: 600; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* المشغل السينمائي */
        #player { display: none; position: fixed; inset: 0; background: #000; z-index: 10001; flex-direction: column; }
        .player-header { padding: 15px; display: flex; align-items: center; background: rgba(0,0,0,0.5); }
        .back-btn { background: var(--main-color); color: black; padding: 8px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        video { width: 100%; height: auto; max-height: 70vh; background: #000; }
        
        .player-body { flex: 1; overflow-y: auto; padding: 20px; }
        .action-bar { display: flex; gap: 20px; justify-content: center; margin-bottom: 25px; border-bottom: 1px solid #222; padding-bottom: 15px; }
        .action-item { cursor: pointer; color: #888; transition: 0.3s; font-size: 1.2rem; }
        .action-item:hover { color: var(--main-color); }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="login-box">
        <h1 style="color:var(--main-color); margin-bottom:30px;">▸ ROD</h1>
        <input type="text" id="username" placeholder="اسم المستخدم">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button class="login-btn" onclick="login()">دخول</button>
    </div>
</div>

<div id="main-content" style="display:none;">
    <header>
        <button onclick="logout()" style="background:none; border:1px solid #333; color:#777; padding:5px 12px; border-radius:5px;">خروج</button>
        <a href="#" class="logo"><span>ROD</span> ▸</a>
    </header>
    
    <div id="sections-list" style="padding-top: 20px;">
        </div>
</div>

<div id="player">
    <div class="player-header">
        <div class="back-btn" onclick="closePlayer()">رجوع</div>
        <div id="p-name" style="margin-right:20px; font-weight:bold;"></div>
    </div>
    <video id="v-play" controls playsinline></video>
    <div class="player-body">
        <div class="action-bar">
            <div class="action-item" onclick="alert('تمت الإضافة للمفضلة')">❤️ مفضلة</div>
            <div class="action-item" onclick="alert('شكراً لتقييمك')">👍 أعجبني</div>
            <div class="action-item">🔗 مشاركة</div>
        </div>
        <div id="giscus-box"></div>
    </div>
</div>

<script>
    const REPO_PATH = "ha8680878-lab/cinema-local";

    window.onload = () => {
        if(localStorage.getItem('ROD_STAY') === 'ok') { startApp(); } 
        else { document.getElementById('auth-screen').style.display = 'flex'; }
    };

    async function login() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        const res = await fetch(`https://raw.githubusercontent.com/${REPO_PATH}/main/keys.json?t=${Date.now()}`);
        const keys = await res.json();
        if(keys.find(k => k.user === u && k.pass === p)) {
            localStorage.setItem('ROD_STAY', 'ok');
            location.reload();
        } else { alert("خطأ في البيانات!"); }
    }

    function logout() { localStorage.removeItem('ROD_STAY'); location.reload(); }

    function startApp() {
        document.getElementById('main-content').style.display = 'block';
        fetchMovies();
    }

    async function fetchMovies() {
        const res = await fetch(`movies.json?v=${Date.now()}`);
        const data = await res.json();
        const list = document.getElementById('sections-list');
        
        // تجميع الأفلام حسب القسم
        const cats = [...new Set(data.map(m => m.category || "أفلام ROD"))];
        
        list.innerHTML = cats.map(c => `
            <div class="row">
                <div class="row-title">${c}</div>
                <div class="row-container">
                    ${data.filter(m => (m.category || "أفلام ROD") === c).map(m => `
                        <div class="card" onclick="openMe('${m.url}', '${m.title}')">
                            <img src="${m.poster}">
                            <div class="card-overlay"><div class="card-title">${m.title}</div></div>
                        </div>
                    `).join('')}
                </div>
            </div>
        `).join('');
    }

    function openMe(url, title) {
        document.getElementById('p-name').innerText = title
