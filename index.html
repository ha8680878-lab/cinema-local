<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROD | عالم الترفيه</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --main-color: #ff9800; --bg-color: #0b0b0b; }
        body { background: var(--bg-color); color: white; font-family: 'Cairo', sans-serif; margin: 0; padding: 20px; }
        header { text-align: center; padding: 20px 0; border-bottom: 2px solid var(--main-color); margin-bottom: 30px; }
        header h1 { color: var(--main-color); font-size: 2.5rem; margin: 0; letter-spacing: 3px; }
        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; max-width: 1000px; margin: auto; }
        .card { background: #1a1a1a; border-radius: 10px; overflow: hidden; border: 1px solid #333; cursor: pointer; transition: 0.3s; position: relative; }
        .card:hover { border-color: var(--main-color); transform: translateY(-5px); }
        .card img { width: 100%; height: 230px; object-fit: cover; }
        .card-info { padding: 8px; text-align: center; }
        .card-info h3 { font-size: 0.85rem; margin: 5px 0; }
        .rating { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.8); color: var(--main-color); padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; }
        
        /* Modal Style */
        #player { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; flex-direction: column; justify-content: center; align-items: center; }
        video { width: 95%; max-width: 800px; border: 1px solid var(--main-color); border-radius: 8px; }
        .close { position: absolute; top: 15px; left: 20px; font-size: 25px; cursor: pointer; background: var(--main-color); color: black; padding: 5px 15px; border-radius: 5px; }
    </style>
</head>
<body>

<header>
    <h1>ROD</h1>
</header>

<div class="container" id="list"></div>

<div id="player">
    <span class="close" onclick="closeVideo()">إغلاق ✕</span>
    <video id="vid" controls playsinline src=""></video>
    <h3 id="vid-title" style="margin-top: 15px;"></h3>
</div>

<script>
    async function init() {
        const res = await fetch('movies.json');
        const data = await res.json();
        const list = document.getElementById('list');

        data.forEach(m => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
                <div class="rating">⭐ ${m.rating}</div>
                <img src="${m.poster}" onerror="this.src='https://via.placeholder.com/500x750?text=No+Poster'">
                <div class="card-info">
                    <h3>${m.title}</h3>
                    <small style="color:#777">${m.year}</small>
                </div>
            `;
            div.onclick = () => {
                const p = document.getElementById('player');
                const v = document.getElementById('vid');
                document.getElementById('vid-title').innerText = m.title;
                v.src = m.url;
                p.style.display = 'flex';
                v.play();
            };
            list.appendChild(div);
        });
    }

    function closeVideo() {
        const p = document.getElementById('player');
        const v = document.getElementById('vid');
        p.style.display = 'none';
        v.pause();
        v.src = "";
    }

    init();
</script>

</body>
</html>
