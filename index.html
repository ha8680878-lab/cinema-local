<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROD | تسجيل الدخول</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --main-color: #ff9800; --bg-color: #0b0b0b; }
        body { background: var(--bg-color); color: white; font-family: 'Cairo', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        
        /* شاشة تسجيل الدخول */
        #auth-screen { text-align: center; width: 100%; padding: 20px; }
        #auth-screen h1 { color: var(--main-color); font-size: 3.5rem; margin-bottom: 20px; letter-spacing: 5px; }
        .login-box { background: #1a1a1a; padding: 40px 30px; border-radius: 20px; border: 1px solid #333; max-width: 400px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #444; background: #222; color: white; text-align: center; font-size: 1.1rem; box-sizing: border-box; }
        input:focus { border-color: var(--main-color); outline: none; }
        .login-btn { width: 100%; padding: 15px; background: var(--main-color); color: black; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.2rem; }
        #error-msg { color: #f44336; margin-top: 15px; display: none; font-weight: bold; }

        /* محتوى الموقع الرئيسي */
        #main-content { display: none; width: 100%; align-self: flex-start; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; border-bottom: 2px solid var(--main-color); background: #000; position: sticky; top: 0; z-index: 100; }
        header h1 { color: var(--main-color); margin: 0; font-size: 1.8rem; }
        .logout-btn { background: #333; color: white; border: 1px solid #444; padding: 5px 15px; border-radius: 5px; cursor: pointer; font-size: 0.9rem; }
        .logout-btn:hover { background: #f44336; border-color: #f44336; }

        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 20px; max-width: 1200px; margin: auto; }
        .card { background: #1a1a1a; border-radius: 12px; overflow: hidden; border: 1px solid #333; cursor: pointer; position: relative; transition: 0.3s; }
        .card img { width: 100%; height: 240px; object-fit: cover; }
        .rating { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.85); color: var(--main-color); padding: 2px 7px; border-radius: 5px; font-size: 0.75rem; font-weight: bold; }
        
        /* مشغل الفيديو */
        #player { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; flex-direction: column; overflow-y: auto; }
        video { width: 100%; max-width: 900px; margin: 80px auto 20px; border: 2px solid var(--main-color); border-radius: 10px; }
        .close-btn { position: absolute; top: 20px; left: 20px; background: var(--main-color); color: black; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="auth-screen">
    <h1>ROD</h1>
    <div class="login-box">
        <input type="text" id="username" placeholder="اسم المستخدم" autocomplete="off">
        <input type="password" id="password" placeholder="كلمة المرور" autocomplete="new-password">
        <button class="login-btn" onclick="login()">دخول المنصة</button>
        <p id="error-msg">بيانات الدخول غير صحيحة!</p>
    </div>
</div>

<div id="main-content">
    <header>
        <h1>ROD</h1>
        <button class="logout-btn" onclick="logout()">تسجيل الخروج</button>
    </header>
    <div class="container" id="movie-list"></div>
</div>

<div id="player">
    <div class="close-btn" onclick="closePlayer()">إغلاق ✕</div>
    <video id="main-video" controls playsinline></video>
    <div id="giscus-container" style="width: 90%; max-width: 900px; margin: 20px auto;"></div>
</div>

<script>
    const GITHUB_USER = "ha8680878-lab";
    const REPO = "cinema-local";

    async function login() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        const err = document.getElementById('error-msg');

        try {
            const res = await fetch(`https://raw.githubusercontent.com/${GITHUB_USER}/${REPO}/main/keys.json`);
            const users = await res.json();
            const found = users.find(user => user.user === u && user.pass === p);

            if (found) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                document.body.style.display = 'block'; 
                loadMovies();
            } else {
                err.style.display = 'block';
            }
        } catch (e) {
            alert("فشل في الوصول لقاعدة البيانات!");
        }
    }

    async function loadMovies() {
        const res = await fetch('movies.json');
        const data = await res.json();
        const list = document.getElementById('movie-list');
        list.innerHTML = "";
        data.forEach(m => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<div class="rating">⭐ ${m.rating}</div><img src="${m.poster}"><div style="padding:10px;text-align:center;">${m.title}</div>`;
            card.onclick = () => {
                document.getElementById('main-video').src = m.url;
                document.getElementById('player').style.display = 'flex';
                document.getElementById('main-video').play();
                loadComments();
            };
            list.appendChild(card);
        });
    }

    function logout() {
        // إعادة تحميل الصفحة تمسح كل بيانات الجلسة المؤقتة وتعود لشاشة القفل
        location.reload();
    }

    function loadComments() {
        const container = document.getElementById('giscus-container');
        container.innerHTML = "";
        const s = document.createElement('script');
        s.src = "https://giscus.app/client.js";
        s.setAttribute("data-repo", `${GITHUB_USER}/${REPO}`);
        s.setAttribute("data-repo-id", "R_kgDON7u00A");
        s.setAttribute("data-category", "General");
        s.setAttribute("data-category-id", "DIC_kwDON7u00M4CnH0X");
        s.setAttribute("data-mapping", "pathname");
        s.setAttribute("data-theme", "dark");
        s.setAttribute("data-lang", "ar");
        s.crossOrigin = "anonymous";
        s.async = true;
        container.appendChild(s);
    }

    function closePlayer() {
        document.getElementById('player').style.display = 'none';
        document.getElementById('main-video').pause();
        document.getElementById('main-video').src = "";
    }
</script>

</body>
</html>
