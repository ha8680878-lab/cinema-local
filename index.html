<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROD | عالم الترفيه</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --main-color: #ff9800; --bg-color: #0b0b0b; }
        body { background: var(--bg-color); color: white; font-family: 'Cairo', sans-serif; margin: 0; min-height: 100vh; }
        
        /* شاشة تسجيل الدخول */
        #auth-screen { text-align: center; width: 100%; padding: 20px; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; }
        .login-box { background: #1a1a1a; padding: 40px 30px; border-radius: 20px; border: 1px solid #333; max-width: 400px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #444; background: #222; color: white; text-align: center; font-size: 1.1rem; box-sizing: border-box; }
        .login-btn { width: 100%; padding: 15px; background: var(--main-color); color: black; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.2rem; }
        
        /* المحتوى الرئيسي */
        #main-content { display: none; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; border-bottom: 2px solid var(--main-color); background: #000; position: sticky; top: 0; z-index: 100; }
        .logout-btn { background: #333; color: white; border: 1px solid #444; padding: 6px 15px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }

        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: #1a1a1a; border-radius: 12px; overflow: hidden; border: 1px solid #333; cursor: pointer; transition: 0.3s; position: relative; }
        .card:hover { transform: translateY(-5px); border-color: var(--main-color); }
        .card img { width: 100%; height: 240px; object-fit: cover; }
        .card-title { padding: 10px; text-align: center; font-size: 0.9rem; }
        
        /* مشغل الفيديو والتعليقات */
        #player { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; flex-direction: column; overflow-y: auto; }
        .close-btn { position: sticky; top: 15px; right: 15px; background: var(--main-color); color: black; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; z-index: 10002; width: fit-content; margin: 15px; }
        video { width: 100%; max-width: 900px; margin: 20px auto; border: 1px solid #333; border-radius: 10px; display: block; }
        .comments-section { width: 95%; max-width: 900px; margin: 20px auto 50px auto; background: #111; padding: 15px; border-radius: 10px; }
    </style>
</head>
<body>

<div id="auth-screen">
    <h1 style="color:var(--main-color); font-size: 3rem; margin-bottom: 20px;">ROD</h1>
    <div class="login-box">
        <input type="text" id="username" placeholder="اسم المستخدم" autocomplete="off">
        <input type="password" id="password" placeholder="كلمة المرور" autocomplete="new-password">
        <button class="login-btn" onclick="login()">دخول المنصة</button>
        <p id="error-msg" style="color:red; display:none; margin-top:15px;">بيانات الدخول غير صحيحة!</p>
    </div>
</div>

<div id="main-content">
    <header>
        <button class="logout-btn" onclick="logout()">تسجيل الخروج</button>
        <h1 style="color:var(--main-color); margin:0;">ROD</h1>
    </header>
    <div class="container" id="movie-list"></div>
</div>

<div id="player">
    <div class="close-btn" onclick="closePlayer()">إغلاق ✕</div>
    <video id="main-video" controls playsinline src=""></video>
    <div class="comments-section" id="giscus-container">
        <p style="text-align:center; color:#777;">جاري تحميل التعليقات...</p>
    </div>
</div>

<script>
    const GITHUB_USER = "ha8680878-lab";
    const REPO = "cinema-local";

    // فحص حالة الدخول فور تحميل الصفحة
    window.onload = function() {
        const session = localStorage.getItem('ROD_LOGIN_STATUS');
        if (session === 'true') {
            document.getElementById('main-content').style.display = 'block';
            loadMovies();
        } else {
            document.getElementById('auth-screen').style.display = 'block';
        }
    };

    async function login() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;

        try {
            // جلب اليوزرات مع منع التخزين المؤقت (Cache) لضمان التحديث اللحظي
            const res = await fetch(`https://raw.githubusercontent.com/${GITHUB_USER}/${REPO}/main/keys.json?t=${new Date().getTime()}`);
            const users = await res.json();
            const found = users.find(user => user.user === u && user.pass === p);

            if (found) {
                localStorage.setItem('ROD_LOGIN_STATUS', 'true');
                location.reload(); 
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        } catch (e) {
            alert("خطأ في الاتصال بالخادم!");
        }
    }

    function logout() {
        localStorage.removeItem('ROD_LOGIN_STATUS');
        location.reload();
    }
