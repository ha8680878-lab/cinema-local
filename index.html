<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ROD | منصة الترفيه</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#080808">
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --main-color: #ff9800; 
            --bg-black: #080808; 
            --card-w: 160px; 
            --transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            background: var(--bg-black); 
            color: white; 
            font-family: 'Cairo', sans-serif; 
            margin: 0; 
            overflow-x: hidden; 
            min-height: 100vh;
        }

        /* الهيدر */
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 5%; 
            background: rgba(0,0,0,0.9); 
            backdrop-filter: blur(15px); 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            border-bottom: 1px solid #1a1a1a; 
        }

        .logo { 
            font-size: 1.8rem; 
            font-weight: 900; 
            color: var(--main-color); 
            text-decoration: none; 
            display: flex; 
            align-items: center; 
            letter-spacing: 2px;
        }

        .logout-btn { 
            background: none; 
            border: 1px solid #333; 
            color: #888; 
            padding: 6px 15px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 0.8rem;
            transition: var(--transition);
        }

        .logout-btn:hover { border-color: var(--main-color); color: white; }

        /* شاشة تسجيل الدخول */
        #auth-screen { 
            position: fixed; 
            inset: 0; 
            background: var(--bg-black); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            z-index: 10000; 
            display: none; 
        }

        .login-box { 
            width: 90%; 
            max-width: 380px; 
            text-align: center; 
            background: #111; 
            padding: 50px 30px; 
            border-radius: 20px; 
            border: 1px solid #222; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        input { 
            width: 100%; 
            padding: 15px; 
            margin-bottom: 20px; 
            border-radius: 10px; 
            border: 1px solid #333; 
            background: #1a1a1a; 
            color: white; 
            text-align: center; 
            font-family: 'Cairo';
            font-size: 1rem;
            outline: none;
            transition: var(--transition);
        }

        input:focus { border-color: var(--main-color); }

        .login-btn { 
            width: 100%; 
            padding: 15px; 
            background: var(--main-color); 
            border: none; 
            border-radius: 10px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 1.1rem; 
            color: black;
            transition: var(--transition);
        }

        .login-btn:active { transform: scale(0.98); }

        /* الأقسام (Sliders) */
        .row { margin-bottom: 35px; padding: 0 0 0 5%; }
        .row-title { 
            font-size: 1.3rem; 
            font-weight: 700; 
            margin-bottom: 15px; 
            border-right: 4px solid var(--main-color); 
            padding-right: 15px; 
            color: #eee;
        }

        .row-container { 
            display: flex; 
            overflow-x: auto; 
            gap: 15px; 
            padding-bottom: 15px; 
            scrollbar-width: none; /* Firefox */
        }

        .row-container::-webkit-scrollbar { display: none; } /* Chrome/Safari */

        /* الكارت */
        .card { 
            flex: 0 0 var(--card-w); 
            border-radius: 12px; 
            overflow: hidden; 
            transition: var(--transition); 
            cursor: pointer; 
            border: 1px solid #1a1a1a; 
            position: relative; 
            background: #111;
        }

        .card:hover { transform: translateY(-5px); border-color: var(--main-color); }

        .card img { 
            width: 100%; 
            height: 230px; 
            object-fit: cover; 
            display: block;
        }

        .card-title { 
            position: absolute; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            background: linear-gradient(transparent, rgba(0,0,0,0.9)); 
            padding: 25px 10px 10px; 
            font-size: 0.85rem; 
            text-align: center; 
            font-weight: 600;
        }

        /* المشغل */
        #player { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: #000; 
            z-index: 10001; 
            flex-direction: column; 
            overflow-y: auto; 
        }

        .player-nav { 
            padding: 15px 5%; 
            background: rgba(0,0,0,0.9); 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            border-bottom: 1px solid #222;
        }

        .back-btn { 
            background: var(--main-color); 
            color: black; 
            padding: 8px 20px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
        }

        video { 
            width: 100%; 
            max-height: 70vh; 
            background: #000; 
            outline: none;
        }

        .interaction-bar { 
            display: flex; 
            justify-content: center; 
            gap: 40px; 
            padding: 20px; 
            border-bottom: 1px solid #1a1a1a;
        }

        .action-item { 
            cursor: pointer; 
            text-align: center; 
            color: #888; 
            transition: 0.3s;
        }

        .action-item:hover { color: var(--main-color); }
        .action-item span { display: block; font-size: 0.7rem; margin-top: 5px; }

        #giscus-area { padding: 20px 5%; }

        @media (max-width: 600px) {
            :root { --card-w: 140px; }
            .row-title { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="login-box">
        <h1 style="color:var(--main-color); font-size: 3rem; margin:0 0 10px 0;">▸ ROD</h1>
        <p style="color:#666; margin-bottom:30px;">سجل دخولك للمشاهدة</p>
        <input type="text" id="username" placeholder="اسم المستخدم" spellcheck="false">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button class="login-btn" onclick="login()">دخول المنصة</button>
    </div>
</div>

<div id="main-content" style="display:none;">
    <header>
        <button class="logout-btn" onclick="logout()">خروج</button>
        <div class="logo"><span>ROD</span> ▸</div>
    </header>
    
    <div id="sections-list" style="margin-top:20px;">
        </div>
</div>

<div id="player">
    <div class="player-nav">
        <div class="back-btn" onclick="closePlayer()">رجوع</div>
        <div id="p-title" style="font-weight:bold; color:var(--main-color); font-size: 0.9rem;"></div>
    </div>
    <video id="v-play" controls playsinline controlsList="nodownload"></video>
    
    <div class="interaction-bar">
        <div class="action-item" onclick="alert('تمت الإضافة للمفضلة')">❤️<span>مفضلة</span></div>
        <div class="action-item" onclick="alert('شكراً لتقييمك!')">👍<span>أعجبني</span></div>
        <div class="action-item" onclick="alert('سيتم توفير ميزة التحميل قريباً')">📥<span>تحميل</span></div>
    </div>

    <div id="giscus-area"></div>
</div>

<script>
    const REPO_URL = "ha8680878-lab/cinema-local";

    // فحص الجلسة عند فتح الموقع
    window.onload = function() {
        if (localStorage.getItem('ROD_ACCESS_GRANTED') === 'true') {
            document.getElementById('main-content').style.display = 'block';
            fetchContent();
        } else {
            document.getElementById('auth-screen').style.display = 'flex';
        }
    };

    // وظيفة تسجيل الدخول
    async function login() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        if(!u || !p) return alert("يرجى إدخال البيانات");

        try {
            const res = await fetch(`https://raw.githubusercontent.com/${REPO_URL}/main/keys.json?v=${Date.now()}`);
            const keys = await res.json();
            const validUser = keys.find(user => user.user === u && user.pass === p);

            if (validUser) {
                localStorage.setItem('ROD_ACCESS_GRANTED', 'true');
                location.reload();
            } else {
                alert("اسم المستخدم أو كلمة المرور غير صحيحة");
            }
        } catch (err) {
            alert("فشل الاتصال بالسيرفر، تأكد من ملف keys.json");
        }
    }

    function logout() {
        localStorage.removeItem('ROD_ACCESS_GRANTED');
        location.reload();
    }

    // جلب الأفلام وترتيبها في سلايدرز
    async function fetchContent() {
        const listContainer = document.getElementById('sections-list');
        try {
            const res = await fetch(`movies.json?v=${Date.now()}`);
            const movies = await res.json();
            
            // استخراج الأقسام الفريدة
            const categories = [...new Set(movies.map(m => m.category || "أحدث الإضافات"))];

            if (movies.length === 0) {
                listContainer.innerHTML = "<p style='text-align:center; padding:50px; color:#555;'>قريباً.. سيتم إضافة الأفلام</p>";
                return;
            }

            listContainer.innerHTML = categories.map(cat => `
                <div class="row">
                    <div class="row-title">${cat}</div>
                    <div class="row-container">
                        ${movies.filter(m => (m.category || "أحدث الإضافات") === cat).map(m => `
                            <div class="card" onclick="openPlayer('${m.url}', '${m.title}')">
                                <img src="${m.poster}" onerror="this.src='https://via.placeholder.com/160x230/111/fff?text=ROD'">
                                <div class="card-title">${m.title}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');

        } catch (e) {
            listContainer.innerHTML = "<p style='text-align:center; color:red; padding:50px;'>فشل تحميل المحتوى</p>";
        }
    }

    function openPlayer(url, title) {
        document.getElementById('p-title').innerText = title;
        const video = document.getElementById('v-play');
        video.src = url;
        document.getElementById('player').style.display = 'flex';
        video.play();
        loadGiscus();
    }

    function closePlayer() {
        document.getElementById('player').style.display = 'none';
        const video = document.getElementById('v-play');
        video.pause();
        video.src = "";
    }

    // تحميل نظام التعليقات
    function loadGiscus() {
        const area = document.getElementById('giscus-area');
        area.innerHTML = "";
        const script = document.createElement('script');
        script.src = "https://giscus.app/client.js";
        script.setAttribute("data-repo", REPO_URL);
        script.setAttribute("data-repo-id", "R_kgDON7u00A");
        script.setAttribute("data-category", "Announcements");
        script.setAttribute("data-category-id", "DIC_kwDON7u00M4CnH0Y");
        script.setAttribute("data-mapping", "title");
        script.setAttribute("data-theme", "dark");
        script.setAttribute("data-lang", "ar");
        script.crossOrigin = "anonymous";
        script.async = true;
        area.appendChild(script);
    }
</script>

</body>
</html>
